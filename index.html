const DEFAULT_NOTES=[
  {id:'1',title:'정규화 제3정규형 vs 제2정규형 혼동',domain:'데이터베이스',tags:['정규화','3NF','함수종속'],importance:3,source:'2025년 1회 기출',created:'2026-06-15',

   summary:'해시 인덱스도 범위 검색에 효율적이라고 잘못 설명',

   mnemonics:['Hash: O(1) 등치만, 범위 X','B-Tree: 등치+범위+정렬 O(log n)','InnoDB 기본 인덱스는 B+Tree'],

   summary:'CIDR /26에서 네트워크/브로드캐스트 주소 2개 제외를 빠뜨리고 64로 계산',
   problem:'192.168.1.0/26 서브넷의 사용 가능한 호스트 수와 브로드캐스트 주소를 구하시오.',

const NOTES_KEY='oa-notes-v2';
const STATUS_KEY='oa-statuses';
function loadNotes(){try{const s=localStorage.getItem(NOTES_KEY);if(s)return JSON.parse(s);}catch{}return DEFAULT_NOTES;}
function saveNotes(n){localStorage.setItem(NOTES_KEY,JSON.stringify(n));}
function loadStatuses(){try{return JSON.parse(localStorage.getItem(STATUS_KEY)||'{}')}catch{return{}}}
function saveStatus(id,s){const a=loadStatuses();a[id]=s;localStorage.setItem(STATUS_KEY,JSON.stringify(a));}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

const STATUS={
  unchecked:{label:'미확인',dot:'#9CA3AF',bg:'#F9FAFB',text:'#374151',border:'#D1D5DB'},
  memorized:{label:'암기 완료',dot:'#22C55E',bg:'#F0FDF4',text:'#15803D',border:'#86EFAC'},
  review:{label:'다시 보기',dot:'#F59E0B',bg:'#FFFBEB',text:'#B45309',border:'#FCD34D'},
  difficult:{label:'어려움',dot:'#EF4444',bg:'#FEF2F2',text:'#B91C1C',border:'#FCA5A5'},
};

function Dot({status,size=7}){const c=STATUS[status]||STATUS.unchecked;return <span style={{display:'inline-block',width:size,height:size,borderRadius:'50%',background:c.dot,flexShrink:0}}/>;}
function StatusPill({status,size='sm'}){
  const c=STATUS[status]||STATUS.unchecked;
  const p=size==='sm'?'2px 8px':'4px 13px',fs=size==='sm'?11:13;
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:p,borderRadius:99,background:c.bg,color:c.text,fontSize:fs,fontWeight:500,whiteSpace:'nowrap',border:`1px solid ${c.border}`}}><Dot status={status} size={6}/>{c.label}</span>;
}
function ImpDots({v}){return <span style={{display:'inline-flex',gap:3}}>{[1,2,3].map(i=><span key={i} style={{width:6,height:6,borderRadius:'50%',background:i<=v?'#4C6EF5':'#E2DDD8'}}/>)}</span>;}
function Chip({label,active,onClick}){
  return <span onClick={onClick} style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:500,background:active?'#EEF2FF':'#F0EDE8',color:active?'#4338CA':'#6B6560',cursor:onClick?'pointer':'default',border:active?'1px solid #C7D2FE':'1px solid transparent',transition:'all .12s'}}>{label}</span>;
}

/* ── Rich Editor ─────────────────────── */
function RichEditor({value,onChange,placeholder,minHeight=200}){
  const ref=useRef(null);
  const savedRange=useRef(null);
  const inited=useRef(false);
  const [selImg,setSelImg]=useState(null); // {el, rect, w}
  const customPxRef=useRef(null);

  useEffect(()=>{
    if(ref.current&&!inited.current){ref.current.innerHTML=value||'';inited.current=true;}
  },[]);

  useEffect(()=>{
    const dismiss=()=>setSelImg(null);
    window.addEventListener('scroll',dismiss,true);
    return()=>window.removeEventListener('scroll',dismiss,true);
  },[]);

  const saveRange=()=>{
    const sel=window.getSelection();
    if(sel&&sel.rangeCount>0)savedRange.current=sel.getRangeAt(0).cloneRange();
  };

  const getCleanHtml=()=>{
    if(!ref.current)return'';
    ref.current.querySelectorAll('img.img-sel').forEach(i=>i.classList.remove('img-sel'));
    return ref.current.innerHTML;
  };

  const exec=(cmd,val=null)=>{
    if(!ref.current)return;
    ref.current.focus();
    if(savedRange.current){const sel=window.getSelection();sel.removeAllRanges();sel.addRange(savedRange.current);}
    document.execCommand(cmd,false,val);
    onChange(getCleanHtml());
    savedRange.current=null;
  };

  const insertImage=()=>{
    saveRange();
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>exec('insertHTML',`<img src="${ev.target.result}" style="width:100%;max-width:100%;height:auto;border-radius:6px;margin:4px 0"/>`);
      r.readAsDataURL(f);
    };
    inp.click();
  };

  const handleEditorClick=e=>{
    if(e.target.tagName==='IMG'){
      const img=e.target;
      ref.current.querySelectorAll('img.img-sel').forEach(i=>i.classList.remove('img-sel'));
      img.classList.add('img-sel');
      const rect=img.getBoundingClientRect();
      const w=img.style.width||'100%';
      setSelImg({el:img,rect,w});
    } else {
      ref.current.querySelectorAll('img.img-sel').forEach(i=>i.classList.remove('img-sel'));
      setSelImg(null);
    }
  };

  const applyImgSize=w=>{
    if(!selImg)return;
    selImg.el.style.width=w;
    selImg.el.style.maxWidth='100%';
    selImg.el.style.height='auto';
    onChange(getCleanHtml());
    selImg.el.classList.add('img-sel');
    setSelImg(prev=>({...prev,w,rect:prev.el.getBoundingClientRect()}));
  };

  const PRESETS=['25%','33%','50%','75%','100%'];

  const TBtn=({children,cmd,val,title})=>(
    <button type="button" title={title}
      onMouseDown={e=>{e.preventDefault();exec(cmd,val);}}
      style={{padding:'3px 7px',borderRadius:4,fontSize:12,fontWeight:600,color:'#374151',background:'#fff',border:'1px solid #E2DDD8',cursor:'pointer'}}>
      {children}
    </button>
  );
  const Sep=()=><span style={{width:1,height:20,background:'#E2DDD8',display:'inline-block',margin:'0 2px',verticalAlign:'middle'}}/>;

  const panelLeft=selImg?Math.min(selImg.rect.left,window.innerWidth-320):0;
  const panelTop=selImg?selImg.rect.bottom+6:0;

  return(
    <div style={{border:'1px solid #E2DDD8',borderRadius:8,overflow:'hidden',background:'#fff'}}>
      <div onMouseDown={e=>e.preventDefault()} style={{display:'flex',flexWrap:'wrap',gap:4,padding:'8px 10px',background:'#F8F6F2',borderBottom:'1px solid #E2DDD8',alignItems:'center'}}>
        <TBtn cmd="bold" title="굵게"><b>B</b></TBtn>
        <TBtn cmd="italic" title="기울임"><i>I</i></TBtn>
        <TBtn cmd="underline" title="밑줄"><u>U</u></TBtn>
        <TBtn cmd="strikeThrough" title="취소선"><s>S</s></TBtn>
        <Sep/>
        <select onMouseDown={e=>e.stopPropagation()} onFocus={saveRange}

            <input ref={customPxRef} type="number" placeholder="px" min="40" max="1600"

              onKeyDown={e=>{if(e.key==='Enter'&&e.target.value){applyImgSize(e.target.value+'px');}}}/>

/* ── Note Card ───────────────────────── */

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>

/* ── Sidebar ─────────────────────────── */
function Sidebar({notes,filters,setFilters,statuses}){
  const active=notes.filter(n=>!n.deleted);
  const allTags=[...new Set(active.flatMap(n=>n.tags))];
  const toggle=(key,val)=>setFilters(f=>{const a=f[key];return{...f,[key]:a.includes(val)?a.filter(x=>x!==val):[...a,val]};});
  const SecTitle=({t})=><div style={{fontSize:11,fontWeight:600,color:'#9B9590',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6,marginTop:12}}>{t}</div>;
  const Btn=({label,active:isActive,onClick,dot,count})=>(
    <button onClick={onClick} style={{display:'flex',alignItems:'center',gap:6,width:'100%',padding:'5px 8px',borderRadius:6,textAlign:'left',fontSize:12,color:isActive?'#1C1A17':'#6B6560',background:isActive?'#EEF2FF':'transparent',fontWeight:isActive?600:400,transition:'all .1s'}}>
      {dot&&<span style={{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0}}/>}
      <span style={{flex:1}}>{label}</span>
      {count!=null&&<span style={{fontSize:11,color:'#B0AAA4'}}>{count}</span>}
    </button>
  );
  const stCounts=useMemo(()=>{const c={};Object.keys(STATUS).forEach(k=>{c[k]=active.filter(n=>(statuses[n.id]||'unchecked')===k).length});return c;},[active,statuses]);
  const hasF=filters.domain.length||filters.tags.length||filters.importance.length||filters.status.length;
  return(
    <div style={{width:196,flexShrink:0,padding:'12px 10px',overflowY:'auto',height:'100%'}}>
      <SecTitle t="상태"/>
      {Object.entries(STATUS).map(([k,cfg])=>(
        <Btn key={k} label={cfg.label} dot={cfg.dot} count={stCounts[k]} active={filters.status.includes(k)} onClick={()=>toggle('status',k)}/>
      ))}
      <SecTitle t="도메인"/>
      {DOMAINS.map(d=><Btn key={d} label={d} active={filters.domain.includes(d)} onClick={()=>toggle('domain',d)}/>)}
      <SecTitle t="중요도"/>
      {[[3,'매우 중요'],[2,'중요'],[1,'보통']].map(([v,l])=>(
        <Btn key={v} label={l} active={filters.importance.includes(v)} onClick={()=>toggle('importance',v)}/>
      ))}
      <SecTitle t="태그"/>
      <div style={{display:'flex',flexWrap:'wrap',gap:4,padding:'0 4px'}}>
        {allTags.map(t=><Chip key={t} label={t} active={filters.tags.includes(t)} onClick={()=>toggle('tags',t)}/>)}
      </div>
      {!!hasF&&<button onClick={()=>setFilters(f=>({...f,domain:[],tags:[],importance:[],status:[]}))}
        style={{width:'100%',padding:'7px',borderRadius:8,fontSize:12,color:'#6B6560',background:'#F0EDE8',fontWeight:500,marginTop:14}}>
        필터 초기화
      </button>}
    </div>
  );
}

/* ── Stats Panel ─────────────────────── */
function StatsPanel({notes,statuses,onStudy}){
  const active=notes.filter(n=>!n.deleted);
  const counts=useMemo(()=>{const c={memorized:0,review:0,difficult:0,unchecked:0};active.forEach(n=>{c[statuses[n.id]||'unchecked']++});return c;},[active,statuses]);
  const pct=active.length?Math.round(counts.memorized/active.length*100):0;
  return(
    <div style={{width:186,flexShrink:0,padding:'16px 14px',overflowY:'auto'}}>
      <div style={{fontSize:11,fontWeight:600,color:'#9B9590',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>학습 현황</div>
      <div style={{background:'#fff',borderRadius:10,border:'1px solid #E8E4DF',padding:14,marginBottom:12}}>
        <div style={{fontSize:28,fontWeight:700,color:'#1C1A17',lineHeight:1}}>{pct}<span style={{fontSize:14,fontWeight:400,color:'#9B9590'}}>%</span></div>
        <div style={{fontSize:12,color:'#9B9590',marginBottom:8,marginTop:2}}>암기 완료율</div>
        <div style={{height:5,background:'#F0EDE8',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:'#22C55E',borderRadius:3,transition:'width .4s'}}/>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:14}}>
        {Object.entries(STATUS).map(([k,cfg])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',background:cfg.bg,borderRadius:7}}>
            <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:cfg.text,fontWeight:500}}><Dot status={k} size={6}/>{cfg.label}</span>
            <span style={{fontSize:13,fontWeight:700,color:cfg.text}}>{counts[k]}</span>

      <button onClick={onStudy} style={{width:'100%',padding:'10px',borderRadius:9,background:'#4C6EF5',color:'#fff',fontSize:13,fontWeight:600}}
        onMouseEnter={e=>e.currentTarget.style.background='#3B5BDB'} onMouseLeave={e=>e.currentTarget.style.background='#4C6EF5'}>
        학습 시작
      </button>
    </div>
  );
}

/* ── Card Editor ─────────────────────── */
function CardEditor({note,onSave,onCancel}){
  const isEdit=!!note;
  const [form,setForm]=useState({
    title:note?.title||'',domain:note?.domain||DOMAINS[0],
    tags:note?.tags?.join(', ')||'',importance:note?.importance||2,
    source:note?.source||'',problem:note?.problem||'',
    mnemonics:note?.mnemonics?.join('\n')||'',memo:note?.memo||'',
  });
  const [html,setHtml]=useState(note?.content||'');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleSave=()=>{
    if(!form.title.trim()){alert('제목을 입력하세요.');return;}
    const tags=form.tags.split(',').map(t=>t.trim()).filter(Boolean);
    const mnemonics=form.mnemonics.split('\n').map(t=>t.trim()).filter(Boolean);
    onSave({
      id:note?.id||genId(),
      title:form.title.trim(),domain:form.domain,tags,
      importance:Number(form.importance),source:form.source.trim(),
      created:note?.created||new Date().toISOString().slice(0,10),
      summary:form.problem.trim().slice(0,80)||html.replace(/<[^>]+>/g,'').slice(0,80),
      problem:form.problem.trim(),content:html,mnemonics,memo:form.memo.trim(),deleted:false,
    });
  };

  const FL=({t})=><div style={{fontSize:12,fontWeight:600,color:'#6B6560',marginBottom:6,marginTop:16}}>{t}</div>;
  const inp={width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid #E2DDD8',fontSize:14,color:'#1C1A17',background:'#fff'};
  return(
    <div style={{flex:1,overflow:'auto',padding:24}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
        <button type="button" onClick={onCancel} style={{display:'flex',alignItems:'center',padding:'6px 10px',borderRadius:7,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:600,flexShrink:0}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700,color:'#1C1A17'}}>{isEdit?'카드 수정':'새 카드 만들기'}</h2>
      </div>
      <div style={{maxWidth:780}}>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginBottom:20}}>
          <button type="button" onClick={onCancel} style={{padding:'8px 16px',borderRadius:8,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:500}}>취소</button>
          <button type="button" onClick={handleSave} style={{padding:'8px 16px',borderRadius:8,background:'#4C6EF5',color:'#fff',fontSize:13,fontWeight:600}}>저장</button>
        </div>
        <FL t="🏷 토픽 제목 *"/>
        <input value={form.title} onChange={e=>set('title',e.target.value)} style={inp} placeholder="카드 제목"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:16}}>
          <div><FL t="도메인"/>
            <select value={form.domain} onChange={e=>set('domain',e.target.value)} style={inp}>
              {DOMAINS.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div><FL t="중요도"/>
            <select value={form.importance} onChange={e=>set('importance',e.target.value)} style={inp}>
              <option value={3}>매우 중요</option><option value={2}>중요</option><option value={1}>보통</option>
            </select>
          </div>
          <div><FL t="출처"/>
            <input value={form.source} onChange={e=>set('source',e.target.value)} style={inp} placeholder="예: 2025년 1회 기출"/>
          </div>
        </div>
        <FL t="태그 (쉼표로 구분)"/>
        <input value={form.tags} onChange={e=>set('tags',e.target.value)} style={inp} placeholder="예: TCP, 네트워크, 프로토콜"/>
        <FL t="📝 내용 (서식 있는 텍스트)"/>
        <RichEditor value={html} onChange={setHtml} placeholder="내용을 입력하세요. 서식 도구로 꾸밀 수 있어요." minHeight={200}/>
        <FL t="🔑 암기두음 (줄바꿈으로 구분)"/>
        <textarea value={form.mnemonics} onChange={e=>set('mnemonics',e.target.value)}
          style={{...inp,minHeight:100,resize:'vertical',lineHeight:1.6}} placeholder="한 줄에 하나씩 입력"/>
        <FL t="📌 메모"/>
        <textarea value={form.memo} onChange={e=>set('memo',e.target.value)}
          style={{...inp,minHeight:80,resize:'vertical',lineHeight:1.6}} placeholder="개인 메모"/>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:20}}>
          <button type="button" onClick={onCancel} style={{padding:'8px 16px',borderRadius:8,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:500}}>취소</button>
          <button type="button" onClick={handleSave} style={{padding:'8px 16px',borderRadius:8,background:'#4C6EF5',color:'#fff',fontSize:13,fontWeight:600}}>저장</button>
        </div>
        <div style={{height:40}}/>
      </div>
    </div>
  );
}

              <div style={{flex:1,marginRight:12}}>
                <div style={{fontSize:14,fontWeight:600,color:'#6B6560'}}>{n.title}</div>
                <div style={{fontSize:12,color:'#B0AAA4',marginTop:2}}>{n.domain} · {n.created}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button type="button" onClick={()=>onRestore(n.id)} style={{padding:'5px 12px',borderRadius:7,background:'#EEF2FF',color:'#4338CA',fontSize:12,fontWeight:500}}>복원</button>
                <button type="button" onClick={()=>setConfirm(n.id)} style={{padding:'5px 12px',borderRadius:7,background:'#FEF2F2',color:'#B91C1C',fontSize:12,fontWeight:500}}>영구 삭제</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {confirm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
          <div style={{background:'#fff',borderRadius:14,padding:28,maxWidth:360,width:'90%',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
            <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:8,color:'#1C1A17'}}>영구 삭제 확인</h3>
            <p style={{fontSize:13,color:'#6B6560',marginBottom:20}}>{confirm==='all'?'휴지통의 모든 카드를':'이 카드를'} 완전히 삭제합니다. 복원 불가.</p>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button type="button" onClick={()=>setConfirm(null)} style={{padding:'9px 20px',borderRadius:9,background:'#E8E4DF',color:'#6B6560',fontWeight:600,fontSize:14}}>취소</button>
              <button type="button" onClick={()=>{onPermDel(confirm);setConfirm(null);}} style={{padding:'9px 20px',borderRadius:9,background:'#EF4444',color:'#fff',fontWeight:600,fontSize:14}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Study Mode ──────────────────────── */
function StudyMode({notes,statuses,onEnd,onStatusChange}){
  const [idx,setIdx]=useState(0);
  const [showAns,setShowAns]=useState(false);
  const [auto,setAuto]=useState(false);
  const [sec,setSec]=useState(20);
  const [left,setLeft]=useState(20);
  const [paused,setPaused]=useState(false);
  const timerRef=useRef(null);
  const note=notes[idx];const total=notes.length;
  const status=statuses[note?.id]||'unchecked';
  useEffect(()=>{
    clearInterval(timerRef.current);
    if(auto&&!paused){timerRef.current=setInterval(()=>setLeft(t=>{if(t<=1){goNext();return sec;}return t-1;}),1000);}
    return()=>clearInterval(timerRef.current);
  },[auto,paused,idx,sec]);
  const goNext=useCallback(()=>{if(idx<total-1){setIdx(i=>i+1);setShowAns(false);setLeft(sec);}else onEnd();},[idx,total,sec,onEnd]);
  const goPrev=()=>{if(idx>0){setIdx(i=>i-1);setShowAns(false);setLeft(sec);}};
  const pick=k=>{onStatusChange(note.id,k);goNext();};
  if(!note)return null;
  const pct=((idx+1)/total)*100;
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',padding:20,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button type="button" onClick={onEnd} style={{padding:'6px 12px',borderRadius:8,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:500,flexShrink:0}}>종료</button>
        <div style={{flex:1,height:6,background:'#E8E4DF',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${pct}%`,background:'#4C6EF5',borderRadius:3,transition:'width .3s'}}/></div>
        <span style={{fontSize:13,color:'#6B6560',flexShrink:0}}>{idx+1} / {total}</span>
        {auto&&<span style={{fontSize:13,fontWeight:700,color:'#4C6EF5',minWidth:32,textAlign:'right'}}>{left}s</span>}
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',background:'#fff',borderRadius:16,border:'1px solid #E8E4DF',padding:'24px 28px',overflow:'auto',maxWidth:780,margin:'0 auto',width:'100%'}}>
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <StatusPill status={status}/><span style={{fontSize:12,color:'#9B9590'}}>{note.domain}</span>
          <ImpDots v={note.importance}/>
          <div style={{marginLeft:'auto',display:'flex',gap:4}}>{note.tags.map(t=><Chip key={t} label={t}/>)}</div>
        </div>
        <div style={{padding:'14px 16px',background:'#F0F4FF',borderRadius:10,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:600,color:'#4338CA',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}}>🏷 토픽</div>
          <div style={{fontSize:17,fontWeight:700,color:'#1C1A17',lineHeight:1.4,marginBottom:note.problem?10:0}}>{note.title}</div>
          {note.problem&&<div style={{fontSize:14,color:'#3D3A36',lineHeight:1.75,whiteSpace:'pre-wrap'}}>{note.problem}</div>}
        </div>
        {!showAns?(
          <button type="button" onClick={()=>setShowAns(true)} style={{width:'100%',padding:14,borderRadius:10,background:'#4C6EF5',color:'#fff',fontSize:15,fontWeight:600,marginTop:'auto'}}
            onMouseEnter={e=>e.currentTarget.style.background='#3B5BDB'} onMouseLeave={e=>e.currentTarget.style.background='#4C6EF5'}>
            내용 확인
          </button>
        ):(
          <div>
            {note.content&&<div style={{padding:'14px 16px',background:'#F0FDF4',borderRadius:10,marginBottom:12,borderLeft:'3px solid #22C55E'}}>
              <div style={{fontSize:11,fontWeight:600,color:'#15803D',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>내용</div>
              <div style={{fontSize:14,lineHeight:1.75}} dangerouslySetInnerHTML={{__html:note.content}}/>
            </div>}
            {note.mnemonics&&note.mnemonics.length>0&&<div style={{padding:'14px 16px',background:'#F5F0FF',borderRadius:10,marginBottom:18}}>
              <div style={{fontSize:11,fontWeight:600,color:'#4338CA',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>암기두음</div>
              <ul style={{paddingLeft:18,display:'flex',flexDirection:'column',gap:4}}>
                {note.mnemonics.map((p,i)=><li key={i} style={{fontSize:13,color:'#4338CA',fontWeight:500}}>{p}</li>)}
              </ul>
            </div>}
            <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
              {[['memorized','✓ 암기 완료'],['review','↩ 다시 보기'],['difficult','✗ 어려움']].map(([k,l])=>{
                const c=STATUS[k];
                return <button key={k} type="button" onClick={()=>pick(k)} style={{padding:'10px 20px',borderRadius:10,fontSize:13,fontWeight:600,background:c.bg,color:c.text,border:`1.5px solid ${c.border}`,flex:1,minWidth:110}}>{l}</button>;
              })}
            </div>
          </div>
        )}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginTop:14,justifyContent:'center',flexWrap:'wrap'}}>
        <button type="button" onClick={goPrev} disabled={idx===0} style={{padding:'8px 16px',borderRadius:8,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:500,opacity:idx===0?.4:1}}>← 이전</button>
        <button type="button" onClick={()=>setPaused(p=>!p)} style={{padding:'8px 14px',borderRadius:8,background:'#E8E4DF',color:'#6B6560',fontSize:13,fontWeight:500}}>{paused?'▶ 재개':'⏸ 일시정지'}</button>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#6B6560',cursor:'pointer'}}>
          <input type="checkbox" checked={auto} onChange={e=>setAuto(e.target.checked)}/>자동 넘김
        </label>
        <select value={sec} onChange={e=>{setSec(+e.target.value);setLeft(+e.target.value);}} style={{fontSize:12,padding:'4px 8px',borderRadius:6,border:'1px solid #E2DDD8',background:'#fff',color:'#6B6560',cursor:'pointer'}}>
          <option value={10}>10초</option><option value={20}>20초</option><option value={30}>30초</option><option value={60}>1분</option>
        </select>
        <button type="button" onClick={goNext} style={{padding:'8px 16px',borderRadius:8,background:'#4C6EF5',color:'#fff',fontSize:13,fontWeight:500}}>다음 →</button>
      </div>
    </div>
  );
}

/* ── Session End ─────────────────────── */
function SessionEnd({notes,statuses,onRestart,onBack}){
  const counts=useMemo(()=>{const c={memorized:0,review:0,difficult:0,unchecked:0};notes.forEach(n=>{c[statuses[n.id]||'unchecked']++});return c;},[notes,statuses]);
  return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:40}}>
      <div style={{textAlign:'center',maxWidth:420}}>
        <div style={{fontSize:52,marginBottom:14}}>🎉</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:6,color:'#1C1A17'}}>학습 세션 완료!</h2>
        <p style={{color:'#9B9590',marginBottom:28,fontSize:14}}>{notes.length}개의 오답을 학습했습니다</p>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:28}}>
          {Object.entries(STATUS).map(([k,cfg])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 18px',background:cfg.bg,borderRadius:10,border:`1px solid ${cfg.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}><Dot status={k} size={8}/><span style={{fontSize:14,color:cfg.text,fontWeight:500}}>{cfg.label}</span></div>
              <span style={{fontSize:20,fontWeight:700,color:cfg.text}}>{counts[k]}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button type="button" onClick={onBack} style={{padding:'10px 22px',borderRadius:9,background:'#E8E4DF',color:'#6B6560',fontWeight:600,fontSize:14}}>목록으로</button>
          <button type="button" onClick={onRestart} style={{padding:'10px 22px',borderRadius:9,background:'#4C6EF5',color:'#fff',fontWeight:600,fontSize:14}}
            onMouseEnter={e=>e.currentTarget.style.background='#3B5BDB'} onMouseLeave={e=>e.currentTarget.style.background='#4C6EF5'}>
            다시 학습
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────── */
function App(){
  const [notes,setNotes]=useState(loadNotes);
  const [view,setView]=useState('list');
  const [sel,setSel]=useState(null);
  const [statuses,setStatuses]=useState(loadStatuses);
  const [filters,setFilters]=useState({domain:[],tags:[],importance:[],status:[],search:''});
  const [sort,setSort]=useState('recent');

  const notesRef=useRef(notes);
  useEffect(()=>{notesRef.current=notes;},[notes]);

  const navigate=useCallback((v,s=null)=>{
    window.history.pushState({view:v,selId:s?.id||null},'');
    setView(v);setSel(s);
  },[]);

  useEffect(()=>{
    window.history.replaceState({view:'list',selId:null},'');
    const h=e=>{
      if(!e.state)return;
      setView(e.state.view||'list');
      setSel(e.state.selId?notesRef.current.find(n=>n.id===e.state.selId)||null:null);
    };
    window.addEventListener('popstate',h);
    return()=>window.removeEventListener('popstate',h);
  },[]);

  const persist=n=>{setNotes(n);saveNotes(n);};
  const handleStatus=(id,s)=>{saveStatus(id,s);setStatuses(loadStatuses());};

  const active=useMemo(()=>notes.filter(n=>!n.deleted),[notes]);
  const filtered=useMemo(()=>{
    let r=[...active];
    const st=loadStatuses();
    if(filters.domain.length)r=r.filter(n=>filters.domain.includes(n.domain));
    if(filters.tags.length)r=r.filter(n=>n.tags.some(t=>filters.tags.includes(t)));
    if(filters.importance.length)r=r.filter(n=>filters.importance.includes(n.importance));
    if(filters.status.length)r=r.filter(n=>filters.status.includes(st[n.id]||'unchecked'));
    if(filters.search)r=r.filter(n=>n.title.includes(filters.search)||n.summary?.includes(filters.search)||n.tags.some(t=>t.includes(filters.search)));
    if(sort==='importance')r.sort((a,b)=>b.importance-a.importance);
    else if(sort==='unmemorized'){const o={unchecked:0,difficult:1,review:2,memorized:3};const st2=loadStatuses();r.sort((a,b)=>(o[st2[a.id]||'unchecked'])-(o[st2[b.id]||'unchecked']));}
    else if(sort==='random')r.sort(()=>Math.random()-.5);
    else r.sort((a,b)=>b.created.localeCompare(a.created));
    return r;
  },[active,filters,sort,statuses]);

  const handleSave=saved=>{
    const exists=notes.find(n=>n.id===saved.id);
    persist(exists?notes.map(n=>n.id===saved.id?saved:n):[saved,...notes]);
    navigate('detail',saved);
  };
  const handleDelete=id=>{persist(notes.map(n=>n.id===id?{...n,deleted:true}:n));navigate('list');};
  const handleRestore=id=>persist(notes.map(n=>n.id===id?{...n,deleted:false}:n));
  const handlePermDel=idOrAll=>{
    if(idOrAll==='all')persist(notes.filter(n=>!n.deleted));
    else persist(notes.filter(n=>n.id!==idOrAll));
  };

  const trashCount=notes.filter(n=>n.deleted).length;
  const curNote=sel?notes.find(n=>n.id===sel.id)||sel:null;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <header style={{display:'flex',alignItems:'center',gap:12,padding:'0 18px',height:52,background:'#fff',borderBottom:'1px solid #E8E4DF',flexShrink:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:4,cursor:'pointer'}} onClick={()=>navigate('list')}>
          <div style={{width:30,height:30,background:'#4C6EF5',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{color:'#fff',fontSize:14,fontWeight:700}}>오</span>
          </div>
          <span style={{fontWeight:700,fontSize:15,color:'#1C1A17',whiteSpace:'nowrap'}}>기술사 오답노트</span>
        </div>
        {(view==='list'||view==='detail')&&(
          <div style={{flex:1,maxWidth:440,position:'relative'}}>
            <input type="text" placeholder="오답 검색..." value={filters.search}
              onChange={e=>setFilters(f=>({...f,search:e.target.value}))}
              style={{width:'100%',padding:'7px 12px 7px 32px',borderRadius:8,border:'1px solid #E2DDD8',background:'#F7F5F1',fontSize:13,color:'#1C1A17'}}/>
            <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'#B0AAA4',fontSize:14,pointerEvents:'none'}}>🔍</span>
          </div>
        )}
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {view==='list'&&<>
            <span style={{fontSize:12,color:'#9B9590'}}>정렬</span>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:6,border:'1px solid #E2DDD8',background:'#fff',color:'#3D3A36',cursor:'pointer'}}>
              <option value="recent">최근 작성순</option>
              <option value="importance">중요도순</option>
              <option value="unmemorized">미암기 우선</option>
              <option value="random">랜덤</option>
            </select>
          </>}
          <button type="button" onClick={()=>navigate('trash')} style={{padding:'6px 11px',borderRadius:7,background:'#F7F5F1',border:'1px solid #E2DDD8',fontSize:12,color:'#6B6560',fontWeight:500,display:'flex',alignItems:'center',gap:4}}>
            🗑 휴지통{trashCount>0&&<span style={{background:'#E8E4DF',borderRadius:99,padding:'0 5px',fontSize:10,color:'#9B9590'}}>{trashCount}</span>}
          </button>
          <button type="button" onClick={()=>navigate('create')} style={{padding:'6px 14px',borderRadius:7,background:'#4C6EF5',color:'#fff',fontSize:13,fontWeight:600}}>
            + 카드 추가
          </button>
        </div>
      </header>

      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {view==='list'&&<>
          <div style={{borderRight:'1px solid #E8E4DF',background:'#FDFCFA',overflow:'auto',flexShrink:0}}>
            <Sidebar notes={notes} filters={filters} setFilters={setFilters} statuses={statuses}/>
          </div>
          <div style={{flex:1,overflow:'auto',padding:20}}>
            {filtered.length===0?(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'#9B9590',gap:8}}>
                <span style={{fontSize:40,opacity:.4}}>📭</span>
                <p style={{fontSize:15,fontWeight:500}}>오답노트가 없습니다</p>
                <p style={{fontSize:13}}>필터 조건을 변경하거나 새 카드를 추가해 보세요</p>
              </div>
            ):(
              <>
                <div style={{fontSize:12,color:'#9B9590',marginBottom:14}}>{filtered.length}개의 오답노트</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12}}>
                  {filtered.map(n=><NoteCard key={n.id} note={n} status={statuses[n.id]||'unchecked'} onClick={()=>navigate('detail',n)}/>)}
                </div>
              </>
            )}
          </div>
          <div style={{borderLeft:'1px solid #E8E4DF',background:'#FDFCFA',flexShrink:0,overflow:'auto'}}>
            <StatsPanel notes={notes} statuses={statuses} onStudy={()=>navigate('study')}/>
          </div>
        </>}
        {view==='detail'&&curNote&&(
          <DetailView note={curNote} status={statuses[curNote.id]||'unchecked'}
            onBack={()=>navigate('list')} onStatusChange={handleStatus}
            onEdit={()=>navigate('edit',curNote)} onDelete={()=>handleDelete(curNote.id)}/>
        )}
        {(view==='create'||view==='edit')&&(
          <CardEditor note={view==='edit'?curNote:null} onSave={handleSave} onCancel={()=>navigate(curNote&&view==='edit'?'detail':'list',curNote&&view==='edit'?curNote:null)}/>
        )}
        {view==='trash'&&(
          <TrashView notes={notes} onRestore={handleRestore} onPermDel={handlePermDel} onBack={()=>navigate('list')}/>
        )}
        {view==='study'&&(
          <StudyMode notes={filtered.length>0?filtered:active} statuses={statuses} onEnd={()=>navigate('session-end')} onStatusChange={handleStatus}/>
        )}
        {view==='session-end'&&(
          <SessionEnd notes={filtered.length>0?filtered:active} statuses={statuses} onRestart={()=>navigate('study')} onBack={()=>navigate('list')}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
